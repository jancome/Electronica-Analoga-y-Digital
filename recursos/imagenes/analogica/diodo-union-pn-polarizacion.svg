<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#fff"/>
  <text x="600" y="55" text-anchor="middle" font-family="Arial" font-size="36" font-weight="700">Diodo semiconductor: unión PN y polarización</text>
  <rect x="35" y="95" width="350" height="545" rx="18" fill="#f7fbff" stroke="#9aa7b1" stroke-width="2"/>
  <text x="210" y="140" text-anchor="middle" font-family="Arial" font-size="30" font-weight="700" fill="#0b49c8">1. Unión PN</text>
  <rect x="85" y="220" width="120" height="220" fill="#ffd9d9" stroke="#333"/>
  <rect x="205" y="220" width="120" height="220" fill="#dcecff" stroke="#333"/>
  <rect x="190" y="220" width="30" height="220" fill="#eee" stroke="#666"/>
  <text x="145" y="205" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#b40000">Región P</text>
  <text x="265" y="205" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#004f9e">Región N</text>
  <text x="205" y="480" text-anchor="middle" font-family="Arial" font-size="19">Región de agotamiento</text>
  <text x="145" y="280" text-anchor="middle" font-family="Arial" font-size="22" fill="#b40000">Huecos</text>
  <text x="265" y="280" text-anchor="middle" font-family="Arial" font-size="22" fill="#004f9e">Electrones</text>
  <text x="115" y="335" font-family="Arial" font-size="32" fill="#b40000">+</text><text x="155" y="375" font-family="Arial" font-size="32" fill="#b40000">+</text><text x="115" y="415" font-family="Arial" font-size="32" fill="#b40000">+</text>
  <text x="245" y="335" font-family="Arial" font-size="34" fill="#004f9e">−</text><text x="285" y="375" font-family="Arial" font-size="34" fill="#004f9e">−</text><text x="245" y="415" font-family="Arial" font-size="34" fill="#004f9e">−</text>
  <text x="210" y="540" text-anchor="middle" font-family="Arial" font-size="21">Permite corriente principalmente</text>
  <text x="210" y="570" text-anchor="middle" font-family="Arial" font-size="21">en un solo sentido.</text>

  <rect x="425" y="95" width="350" height="545" rx="18" fill="#fffaf6" stroke="#9aa7b1" stroke-width="2"/>
  <text x="600" y="140" text-anchor="middle" font-family="Arial" font-size="29" font-weight="700" fill="#0b49c8">2. Polarización directa</text>
  <line x1="490" y1="340" x2="560" y2="340" stroke="#111" stroke-width="4"/>
  <line x1="560" y1="310" x2="560" y2="370" stroke="#111" stroke-width="4"/>
  <text x="500" y="315" font-family="Arial" font-size="28" fill="#d40000">+</text><text x="500" y="382" font-family="Arial" font-size="28">−</text>
  <line x1="560" y1="340" x2="635" y2="340" stroke="#111" stroke-width="4"/>
  <polygon points="635,310 635,370 680,340" fill="#111"/>
  <line x1="695" y1="310" x2="695" y2="370" stroke="#111" stroke-width="5"/>
  <line x1="695" y1="340" x2="735" y2="340" stroke="#111" stroke-width="4"/>
  <polyline points="740,330 760,330 760,350 785,350" fill="none" stroke="#111" stroke-width="4"/>
  <path d="M 515 430 C 575 395, 650 395, 720 430" fill="none" stroke="#d40000" stroke-width="4"/>
  <polygon points="730,430 710,420 715,442" fill="#d40000"/>
  <text x="620" y="465" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#d40000">El diodo conduce</text>
  <text x="600" y="535" text-anchor="middle" font-family="Arial" font-size="21">El ánodo queda positivo</text>
  <text x="600" y="565" text-anchor="middle" font-family="Arial" font-size="21">respecto al cátodo.</text>

  <rect x="815" y="95" width="350" height="545" rx="18" fill="#fff7f7" stroke="#9aa7b1" stroke-width="2"/>
  <text x="995" y="140" text-anchor="middle" font-family="Arial" font-size="29" font-weight="700" fill="#0b49c8">3. Polarización inversa</text>
  <line x1="880" y1="340" x2="950" y2="340" stroke="#111" stroke-width="4"/>
  <line x1="950" y1="310" x2="950" y2="370" stroke="#111" stroke-width="4"/>
  <text x="890" y="315" font-family="Arial" font-size="28">−</text><text x="890" y="382" font-family="Arial" font-size="28" fill="#d40000">+</text>
  <line x1="950" y1="340" x2="1025" y2="340" stroke="#111" stroke-width="4"/>
  <polygon points="1025,310 1025,370 1070,340" fill="#111"/>
  <line x1="1085" y1="310" x2="1085" y2="370" stroke="#111" stroke-width="5"/>
  <line x1="1085" y1="340" x2="1125" y2="340" stroke="#111" stroke-width="4"/>
  <line x1="905" y1="430" x2="1095" y2="430" stroke="#d40000" stroke-width="4" stroke-dasharray="10 10"/>
  <text x="997" y="465" text-anchor="middle" font-family="Arial" font-size="24" font-weight="700" fill="#d40000">El diodo bloquea</text>
  <text x="997" y="535" text-anchor="middle" font-family="Arial" font-size="21">Solo existe corriente de fuga</text>
  <text x="997" y="565" text-anchor="middle" font-family="Arial" font-size="21">muy pequeña.</text>
</svg>
